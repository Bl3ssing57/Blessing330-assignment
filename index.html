<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CROWN YOURSELF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7dff3;
        }
        .navbar-custom {
            background: #2c0058;
            padding: 15px 0;
        }
        .navbar-brand {
            color: #f6c45f !important;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .nav-link {
            color: #fff !important;
            margin-left: 20px;
        }
        .nav-link:hover {
            color: #f6c45f !important;
        }
        .hero-section {
            padding: 70px 0 60px;
            text-align: center;
        }
        .hero-section h1 {
            font-family: Georgia, serif;
            color: #2c0058;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 50px;
        }
        .hero-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 22px;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .hero-card {
            border: 2px solid #d5a65c;
            border-radius: 6px;
            overflow: hidden;
            background: rgba(255,255,255,0.35);
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            min-height: 170px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #2c0058;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .hero-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.16);
        }
        .hero-card.image-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .hero-card.text-card {
            font-family: Georgia, serif;
            font-size: 1.6rem;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.28);
        }
        .hero-card.text-card .text-wrap {
            line-height: 1.2;
        }
        .hero-card.purple-bg {
            background: linear-gradient(135deg, #f0c7ff, #e2b8ff);
        }
        footer {
            background: #2c0058;
            color: white;
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-custom">
            <div class="container">
                <a class="navbar-brand" href="index.html">CROWN YOURSELF</a>
                <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="about us.html">About Us</a><li>
                        <li class="nav-item"><a class="nav-link" href="healing and empowerment.html">Healing & Empowerment</a></li>
                        <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                        <li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>
                        <li class="nav-item"><a class="nav-link" href="resources.html">Resources</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <div class="container">
                <h1>Heal. Grow. Thrive.<br>Crown Yourself.</h1>
                <div class="hero-grid">
                    <a class="hero-card image-card" href="gallery.html">
                        <img src="c790b94f04b8dffda36b8c6bb7cda19c.jpg" alt="Inspiration image">
                    </a>
                    <a class="hero-card text-card purple-bg" href="about us.html">
                        <div class="text-wrap">LOVE<br>YOURSELF</div>
                    </a>
                    <a class="hero-card text-card" href="healing and empowerment.html">
                        <div class="text-wrap">YOU ARE<br>ENOUGH</div>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Crown Yourself. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
