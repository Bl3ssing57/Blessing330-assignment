<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEEDBACK - Crown Yourself</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7dff3;
        }

        .navbar-custom {
            background: #2c0058;
            padding: 15px 0;
        }

        .navbar-brand {
            color: #f6c45f !important;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .nav-link {
            color: #fff !important;
            margin-left: 20px;
        }

        .nav-link:hover {
            color: #f6c45f !important;
        }

        .page-section {
            padding: 70px 0 60px;
            text-align: center;
        }

        .section-title {
            font-family: Georgia, serif;
            color: #2c0058;
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .form-box {
            max-width: 700px;
            margin: 20px auto;
            border: 2px solid #d5a65c;
            border-radius: 10px;
            background: rgba(255,255,255,0.5);
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            padding: 30px;
            text-align: left;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #2c0058;
        }

        input, textarea {
            width: 100%;
            margin-top: 8px;
            padding: 12px;
            border: 1px solid #d5a65c;
            border-radius: 8px;
            background: rgba(255,255,255,0.8);
            color: #2c0058;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: #2c0058;
            box-shadow: 0 0 0 0.2rem rgba(44,0,88,0.15);
        }

        textarea {
            height: 130px;
            resize: vertical;
        }

        .buttons {
            margin-top: 25px;
            display: flex;
            gap: 12px;
            justify-content: flex-start;
        }

        .submit-btn, .clear-btn {
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .submit-btn {
            background: #2c0058;
            color: #fff;
        }

        .clear-btn {
            background: #d5a65c;
            color: #2c0058;
        }

        .submit-btn:hover, .clear-btn:hover {
            opacity: 0.9;
        }

        footer {
            background: #2c0058;
            color: white;
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-custom">
            <div class="container">
                <a class="navbar-brand" href="index.html">Crown Yourself</a>
                <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                    <ul class="navbar-nav">
                        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="about us.html">About</a></li>
                        <li class="nav-item"><a class="nav-link active" href="feedback.html">Feedback</a></li>
                        <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                        <li class="nav-item"><a class="nav-link" href="healing and empowerment.html">Healing &amp; Empowerment</a></li>
                        <li class="nav-item"><a class="nav-link" href="resources.html">Resources</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="page-section">
        <div class="container">
            <h2 class="section-title">Feedback</h2>
            <div class="form-box">
                <form action="feedback.html" method="get">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" required>

                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" required>

                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>

                    <label for="message">Leave us a Message</label>
                    <textarea id="message" name="message" required></textarea>

                    <div class="buttons">
                        <button type="reset" class="clear-btn">Clear</button>
                        <button type="submit" class="submit-btn">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Crown Yourself. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
